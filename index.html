<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* CONTAINER */
.container{
    background:white;
    padding:25px;
    width:350px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE */
h2{
    text-align:center;
    color:#333;
}

/* INPUT AREA */
.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* BUTTON */
button{
    padding:10px 15px;
    border:none;
    background:#4CAF50;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#45a049;
}

/* LIST */
ul{
    list-style:none;
    padding:0;
    margin-top:15px;
}

li{
    background:#f1f5ff;
    padding:10px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    border-radius:5px;
}

/* DELETE BUTTON */
.delete{
    background:#ff4d4d;
}
</style>
</head>

<body>

<div class="container">
    <h2>To-Do List</h2>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter task">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
function addTask(){
    const input = document.getElementById("taskInput");
    const task = input.value.trim();

    if(task){
        const li = document.createElement("li");
        li.innerHTML = `
            <span>${task}</span>
            <button class="delete" onclick="this.parentElement.remove()">X</button>
        `;
        document.getElementById("taskList").appendChild(li);
        input.value="";
    }
}
</script>

</body>
</html>
